name: Publish Resources Manifest

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-resources.yml
      - manifest.json
      - package.json
      - resources/**
      - scripts/**
      - skills/**
      - sponsors/**
  pull_request:
    paths:
      - .github/workflows/publish-resources.yml
      - manifest.json
      - package.json
      - resources/**
      - scripts/**
      - skills/**
      - sponsors/**
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build public resource JSON
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
